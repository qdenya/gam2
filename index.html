<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Jump Telegram Mini App</title>

    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
      }

      canvas {
        background: #eaf7ff;
        display: block;
      }
    </style>
  </head>

  <body>
    <canvas id="game" width="400" height="600"></canvas>

    <script src="https://telegram.org/js/telegram-web-app.js?62"></script>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const WIDTH = canvas.width;
      const HEIGHT = canvas.height;

      const player = {
        x: WIDTH / 2 - 20,
        y: HEIGHT - 100,
        width: 40,
        height: 40,
        speedX: 0,
        speedY: 0,
        jumpPower: -13,
        gravity: 0.45,
      };

      let platforms = [];
      let monsters = [];

      let score = 0;
      let bestScore = 0;
      let gameOver = false;

      const keys = {
        left: false,
        right: false,
      };

      /**
       * Tilt state
       */
      let accelX = 0;
      let accelY = 0;
      let accelZ = 0;

      let steeringAngle = 0;
      let smoothTilt = 0;
      let baseTilt = null;

      let tiltDebugText = "Tilt sensor not started";

      function createPlatform(y) {
        return {
          x: Math.random() * (WIDTH - 80),
          y: y,
          width: 80,
          height: 12,
          broken: false,
        };
      }

      function createPlatforms() {
        platforms = [];

        for (let i = 0; i < 8; i++) {
          platforms.push(createPlatform(i * 80));
        }

        platforms.push({
          x: WIDTH / 2 - 40,
          y: HEIGHT - 20,
          width: 80,
          height: 12,
          broken: false,
        });
      }

      function renderPlatforms() {
        platforms.forEach((platform) => {
          if (platform.broken) {
            ctx.fillStyle = "#8b4513";
          } else {
            ctx.fillStyle = "green";
          }

          ctx.fillRect(
            platform.x,
            platform.y,
            platform.width,
            platform.height,
          );
        });
      }

      function drawPlayer() {
        ctx.fillStyle = "#ffdd33";
        ctx.fillRect(player.x, player.y, player.width, player.height);

        ctx.fillStyle = "#000";
        ctx.fillRect(player.x + 8, player.y + 10, 6, 6);
        ctx.fillRect(player.x + 26, player.y + 10, 6, 6);

        ctx.fillRect(player.x + 12, player.y + 28, 16, 4);
      }

      function normalizeAngle(angle) {
        while (angle > Math.PI) {
          angle -= Math.PI * 2;
        }

        while (angle < -Math.PI) {
          angle += Math.PI * 2;
        }

        return angle;
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function updateSteeringFromTilt(rawTilt) {
        if (baseTilt === null) {
          baseTilt = rawTilt;
        }

        let relativeTilt = normalizeAngle(rawTilt - baseTilt);

        /**
         * Небольшое сглаживание, чтобы убрать дрожание, но не делать отклик вялым.
         */
        smoothTilt = smoothTilt * 0.55 + relativeTilt * 0.45;

        /**
         * Сразу учитываем сторону наклона.
         */
        steeringAngle = clamp(smoothTilt, -0.6, 0.6);

        tiltDebugText =
          "x: " +
          accelX.toFixed(2) +
          " y: " +
          accelY.toFixed(2) +
          " z: " +
          accelZ.toFixed(2) +
          " steering: " +
          steeringAngle.toFixed(3);
      }

      function updatePlayer() {
        const keyboardSpeed = 5;

        /**
         * Для tilt-сенсора чувствительность должна быть умеренной.
         */
        const steeringDeadZone = 0.02;
        const steeringSensitivity = 12;

        if (keys.left) {
          player.speedX = -keyboardSpeed;
        } else if (keys.right) {
          player.speedX = keyboardSpeed;
        } else {
          if (Math.abs(steeringAngle) > steeringDeadZone) {
            player.speedX = steeringAngle * steeringSensitivity;
          } else {
            player.speedX = 0;
          }
        }

        player.speedX = clamp(player.speedX, -6, 6);

        player.x += player.speedX;

        player.speedY += player.gravity;
        player.y += player.speedY;

        /**
         * Переход через край экрана.
         */
        if (player.x + player.width < 0) {
          player.x = WIDTH;
        }

        if (player.x > WIDTH) {
          player.x = -player.width;
        }
      }

      function checkPlatformCollision() {
        platforms.forEach((platform) => {
          const isFalling = player.speedY > 0;

          const playerBottom = player.y + player.height;
          const playerPrevBottom = player.y + player.height - player.speedY;

          const isInsideX =
            player.x + player.width > platform.x &&
            player.x < platform.x + platform.width;

          const landedOnPlatform =
            playerBottom >= platform.y &&
            playerPrevBottom <= platform.y + platform.height;

          if (isFalling && isInsideX && landedOnPlatform && !platform.broken) {
            player.speedY = player.jumpPower;

            if (platform.type === "break") {
              platform.broken = true;
              platform.fallSpeed = 4;
            }
          }
        });
      }

      function moveCamera() {
        const cameraLine = HEIGHT / 2;

        if (player.y < cameraLine) {
          const diff = cameraLine - player.y;

          player.y = cameraLine;

          platforms.forEach((platform) => {
            platform.y += diff;
          });

          monsters.forEach((monster) => {
            monster.y += diff;
          });

          score += Math.floor(diff);

          if (score > bestScore) {
            bestScore = score;
          }
        }
      }

      function updatePlatforms() {
        platforms.forEach((platform, index) => {
          if (platform.broken) {
            platform.y += platform.fallSpeed;
            platform.fallSpeed += 0.3;
          }

          if (platform.y > HEIGHT) {
            platforms[index] = createPlatform(-20);
          }
        });
      }

      function checkGameOver() {
        if (player.y > HEIGHT) {
          gameOver = true;
        }
      }

      function drawDebugInfo() {
        ctx.fillStyle = "#000";
        ctx.font = "14px Arial";

        ctx.fillText(tiltDebugText, 20, 30);
        ctx.fillText("Space / tap = recalibrate steering", 20, 50);
        ctx.fillText("Score: " + score, 20, 70);
        ctx.fillText("Best: " + bestScore, 20, 90);
      }

      function drawGameOver() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        ctx.fillStyle = "#fff";
        ctx.font = "32px Arial";
        ctx.fillText("Game Over", WIDTH / 2 - 85, HEIGHT / 2 - 40);

        ctx.font = "18px Arial";
        ctx.fillText("Score: " + score, WIDTH / 2 - 40, HEIGHT / 2);

        ctx.fillText(
          "Tap to restart",
          WIDTH / 2 - 55,
          HEIGHT / 2 + 40,
        );
      }

      function resetGame() {
        player.x = WIDTH / 2 - 20;
        player.y = HEIGHT - 100;
        player.speedX = 0;
        player.speedY = 0;

        score = 0;
        gameOver = false;

        baseTilt = null;
        smoothTilt = 0;
        steeringAngle = 0;

        createPlatforms();
      }

      function recalibrateSteering() {
        baseTilt = null;
        smoothTilt = 0;
        steeringAngle = 0;
      }

      function gameLoop() {
        ctx.clearRect(0, 0, WIDTH, HEIGHT);

        if (!gameOver) {
          renderPlatforms();
          drawPlayer();
          drawDebugInfo();

          updatePlayer();
          checkPlatformCollision();
          moveCamera();
          updatePlatforms();
          checkGameOver();
        } else {
          drawGameOver();
        }

        requestAnimationFrame(gameLoop);
      }

      document.addEventListener("keydown", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.left = true;
        }

        if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.right = true;
        }

        if (event.code === "Space") {
          recalibrateSteering();
        }
      });

      document.addEventListener("keyup", (event) => {
        if (event.code === "ArrowLeft" || event.code === "KeyA") {
          keys.left = false;
        }

        if (event.code === "ArrowRight" || event.code === "KeyD") {
          keys.right = false;
        }
      });

      canvas.addEventListener("click", () => {
        if (gameOver) {
          resetGame();
        } else {
          recalibrateSteering();
        }
      });

      /**
       * Telegram Mini App setup
       */
      const tg = window.Telegram.WebApp;

      tg.ready();
      tg.expand();

      if (tg.DeviceOrientation) {
        tg.DeviceOrientation.start(
          {
            refresh_rate: 50,
            need_absolute: false,
          },
          function (started) {
            if (!started) {
              console.warn("Device orientation tracking failed to start");
              tiltDebugText = "Device orientation failed to start";
            } else {
              tiltDebugText = "Device orientation started";
            }
          },
        );

        tg.onEvent("deviceOrientationChanged", function () {
          accelX = tg.DeviceOrientation.beta || 0;
          accelY = tg.DeviceOrientation.alpha || 0;
          accelZ = tg.DeviceOrientation.gamma || 0;

          updateSteeringFromTilt(tg.DeviceOrientation.gamma || 0);
        });

        tg.onEvent("deviceOrientationFailed", function (error) {
          console.warn("Device orientation is not supported", error);
          tiltDebugText = "Device orientation is not supported";
        });
      } else if (tg.Accelerometer) {
        tg.Accelerometer.start(
          { refresh_rate: 50 },
          function (started) {
            if (!started) {
              console.warn("Accelerometer tracking failed to start");
              tiltDebugText = "Accelerometer failed to start";
            } else {
              tiltDebugText = "Accelerometer started";
            }
          },
        );

        tg.onEvent("accelerometerChanged", function () {
          accelX = tg.Accelerometer.x || 0;
          accelY = tg.Accelerometer.y || 0;
          accelZ = tg.Accelerometer.z || 0;

          /**
           * Fallback: use side acceleration as a rough direction signal.
           */
          steeringAngle = clamp(accelX * 0.08, -0.6, 0.6);
          tiltDebugText =
            "x: " +
            accelX.toFixed(2) +
            " y: " +
            accelY.toFixed(2) +
            " z: " +
            accelZ.toFixed(2) +
            " steering: " +
            steeringAngle.toFixed(3);
        });

        tg.onEvent("accelerometerFailed", function (error) {
          console.warn("Accelerometer is not supported", error);
          tiltDebugText = "Accelerometer is not supported";
        });
      } else {
        console.warn("Tilt sensor API is not available");
        tiltDebugText = "Tilt sensor API is not available";
      }

      createPlatforms();
      gameLoop();
    </script>
  </body>
</html>
